name: Fetch CELCAT Events Data

on:
  schedule:
    - cron: '15 */6 * * *'   # every 6 hours (offset from calendar workflow)
  workflow_dispatch:          # manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch all M1 Info S2 events
        run: python fetch_all_events.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add celcat-data.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update CELCAT event data [skip ci]"
            git push
          fi
